schema_version = 1
family_id = "world_model_baselines_v1"
display_name = "World-Model Baselines v1"
status = "prototype"
summary = "Kelmarsh-only key baseline family for world_model_state_space_v1, including last-value persistence, shared-weight TFT, shared-weight TimeXer without graph inputs, a DGCRN-style dynamic-graph baseline, a Chronos-2 zero-shot baseline, a no-graph iTransformer baseline, and an MTGNN calendar-graph baseline."
model_family = "world_model_baseline"
training_mode = "trainable"
implementation_root = "experiment/families/world_model_baselines_v1"
readme_path = "experiment/families/world_model_baselines_v1/README.md"
runner_entrypoint = "experiment/families/world_model_baselines_v1/run_world_model_baselines_v1.py"
default_output_path = "experiment/artifacts/published/world_model_baselines_v1/{run_timestamp}.csv"
default_output_schema_version = "world_model_baselines_v1.long_metrics.v1"
dataset_scope = ["kelmarsh"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["val", "test"]
supported_feature_protocols = ["world_model_v1"]
implementation_label_kind = "model_variant"
implementation_labels = [
  "world_model_persistence_last_value_v1_farm_sync",
  "world_model_shared_weight_tft_no_graph_v1_farm_sync",
  "world_model_shared_weight_timexer_no_graph_v1_farm_sync",
  "world_model_dgcrn_v1_farm_sync",
  "world_model_chronos_2_zero_shot_v1_farm_sync",
  "world_model_itransformer_no_graph_v1_farm_sync",
  "world_model_mtgnn_calendar_graph_v1_farm_sync",
]
model_variants = [
  "world_model_persistence_last_value_v1_farm_sync",
  "world_model_shared_weight_tft_no_graph_v1_farm_sync",
  "world_model_shared_weight_timexer_no_graph_v1_farm_sync",
  "world_model_dgcrn_v1_farm_sync",
  "world_model_chronos_2_zero_shot_v1_farm_sync",
  "world_model_itransformer_no_graph_v1_farm_sync",
  "world_model_mtgnn_calendar_graph_v1_farm_sync",
]
notes = [
  "The family is marked trainable because it includes TFT, TimeXer, DGCRN, iTransformer, and MTGNN baselines; persistence is analytic and writes a synthetic epoch-0 training-history row.",
  "All variants consume the existing world_model_v1 task bundle through the state-space tensor contract and do not introduce a dataset-side feature protocol.",
  "The DGCRN variant keeps the same Kelmarsh-only world_model_v1 bundle contract and adds dynamic graph recurrence with static-node embeddings and pairwise geometry bias.",
  "The Chronos-2 variant adapts the same world_model_v1 tensor contract into zero-shot Chronos payloads without changing dataset-side semantics.",
  "The iTransformer variant consumes full farm windows without graph inputs and predicts all turbines jointly from the same world_model_v1 tensor contract.",
  "The MTGNN variant consumes the same local-history and calendar tensors while learning an adaptive graph over turbines without introducing new dataset-side features.",
]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "farm"

[implementation_bindings]
world_model_persistence_last_value_v1_farm_sync = "world_model_v1"
world_model_shared_weight_tft_no_graph_v1_farm_sync = "world_model_v1"
world_model_shared_weight_timexer_no_graph_v1_farm_sync = "world_model_v1"
world_model_dgcrn_v1_farm_sync = "world_model_v1"
world_model_chronos_2_zero_shot_v1_farm_sync = "world_model_v1"
world_model_itransformer_no_graph_v1_farm_sync = "world_model_v1"
world_model_mtgnn_calendar_graph_v1_farm_sync = "world_model_v1"
