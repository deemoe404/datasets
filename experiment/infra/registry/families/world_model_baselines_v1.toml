schema_version = 1
family_id = "world_model_baselines_v1"
display_name = "World-Model Baselines v1"
status = "prototype"
summary = "Kelmarsh-only key baseline family for world_model_state_space_v1, including last-value persistence and shared-weight TFT without graph inputs."
model_family = "world_model_baseline"
training_mode = "trainable"
implementation_root = "experiment/families/world_model_baselines_v1"
readme_path = "experiment/families/world_model_baselines_v1/README.md"
runner_entrypoint = "experiment/families/world_model_baselines_v1/run_world_model_baselines_v1.py"
default_output_path = "experiment/artifacts/published/world_model_baselines_v1/latest.csv"
default_output_schema_version = "world_model_baselines_v1.long_metrics.v1"
dataset_scope = ["kelmarsh"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["val", "test"]
supported_feature_protocols = ["world_model_v1"]
implementation_label_kind = "model_variant"
implementation_labels = [
  "world_model_persistence_last_value_v1_farm_sync",
  "world_model_shared_weight_tft_no_graph_v1_farm_sync",
]
model_variants = [
  "world_model_persistence_last_value_v1_farm_sync",
  "world_model_shared_weight_tft_no_graph_v1_farm_sync",
]
notes = [
  "The family is marked trainable because it includes a TFT baseline; persistence is analytic and writes a synthetic epoch-0 training-history row.",
  "Both baselines consume the existing world_model_v1 task bundle through the state-space tensor contract and do not introduce a dataset-side feature protocol.",
]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "farm"

[implementation_bindings]
world_model_persistence_last_value_v1_farm_sync = "world_model_v1"
world_model_shared_weight_tft_no_graph_v1_farm_sync = "world_model_v1"
