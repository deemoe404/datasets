schema_version = 1
family_id = "chronos2_power_only"
display_name = "Chronos-2 Power-Only"
status = "archived"
summary = "Zero-shot Chronos-2 baselines on turbine power histories, including power-stat and multivariate neighborhood variants."
model_family = "chronos-2"
training_mode = "zero_shot"
implementation_root = "experiment/families/chronos-2"
readme_path = "experiment/families/chronos-2/README.md"
runner_entrypoint = "experiment/families/chronos-2/run_power_only.py"
orchestrator_entrypoint = "experiment/families/chronos-2/run_power_only_full.py"
default_output_path = "experiment/artifacts/published/chronos2_power_only/latest.csv"
default_output_schema_version = "chronos2_power_only.long_metrics.v1"
dataset_scope = ["kelmarsh", "penmanshiel", "hill_of_towie", "sdwpf_kddcup"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["test"]
supported_feature_protocols = ["power_only", "power_stats_history"]
implementation_label_kind = "variant"
implementation_labels = [
  "univariate",
  "univariate_power_stats",
  "multivariate_knn6",
  "multivariate_knn6_power_stats",
]
model_variants = [
  "univariate",
  "univariate_power_stats",
  "multivariate_knn6",
  "multivariate_knn6_power_stats",
]
notes = [
  "Feature protocols capture input semantics only; layout differences remain family-local variants.",
]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "turbine"

[implementation_bindings]
univariate = "power_only"
univariate_power_stats = "power_stats_history"
multivariate_knn6 = "power_only"
multivariate_knn6_power_stats = "power_stats_history"
