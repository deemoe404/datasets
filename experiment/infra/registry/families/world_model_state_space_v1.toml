schema_version = 1
family_id = "world_model_state_space_v1"
display_name = "World-Model State-Space v1"
status = "prototype"
summary = "Kelmarsh-only state-space filtering and open-loop rollout world-model family that consumes the existing world_model_v1 task bundle."
model_family = "world_model"
training_mode = "trainable"
implementation_root = "experiment/families/world_model_state_space_v1"
readme_path = "experiment/families/world_model_state_space_v1/README.md"
runner_entrypoint = "experiment/families/world_model_state_space_v1/run_world_model_state_space_v1.py"
default_output_path = "experiment/artifacts/published/world_model_state_space_v1/latest.csv"
default_output_schema_version = "world_model_state_space_v1.long_metrics.v1"
dataset_scope = ["kelmarsh"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["val", "test"]
supported_feature_protocols = ["world_model_v1"]
implementation_label_kind = "model_variant"
implementation_labels = [
  "world_model_state_space_v1_farm_sync",
  "world_model_state_space_v1_wake_off_farm_sync",
  "world_model_state_space_v1_graph_off_farm_sync",
  "world_model_state_space_v1_no_farm_aux_farm_sync",
  "world_model_state_space_v1_no_met_aux_farm_sync",
]
model_variants = [
  "world_model_state_space_v1_farm_sync",
  "world_model_state_space_v1_wake_off_farm_sync",
  "world_model_state_space_v1_graph_off_farm_sync",
  "world_model_state_space_v1_no_farm_aux_farm_sync",
  "world_model_state_space_v1_no_met_aux_farm_sync",
]
notes = [
  "This family keeps world_model_rollout_v1 as a simplified baseline and carries the state-space world-model MVP.",
  "It is intentionally Kelmarsh-only in v1 and does not introduce a new dataset-side feature protocol.",
  "The default runner still targets the canonical farm-sync variant; ablations are additional explicit model variants within the same family.",
]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "farm"

[implementation_bindings]
world_model_state_space_v1_farm_sync = "world_model_v1"
world_model_state_space_v1_wake_off_farm_sync = "world_model_v1"
world_model_state_space_v1_graph_off_farm_sync = "world_model_v1"
world_model_state_space_v1_no_farm_aux_farm_sync = "world_model_v1"
world_model_state_space_v1_no_met_aux_farm_sync = "world_model_v1"
