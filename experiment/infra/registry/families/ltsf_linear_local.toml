schema_version = 1
family_id = "ltsf_linear_local"
display_name = "LTSF-Linear Local"
status = "archived"
summary = "Trainable local NLinear and DLinear baselines on the dense turbine task with staged past covariates."
model_family = "ltsf-linear"
training_mode = "trainable"
implementation_root = "experiment/families/ltsf-linear"
readme_path = "experiment/families/ltsf-linear/README.md"
runner_entrypoint = "experiment/families/ltsf-linear/run_ltsf_linear.py"
orchestrator_entrypoint = "experiment/families/ltsf-linear/run_ltsf_linear_full.py"
default_output_path = "experiment/artifacts/published/ltsf_linear_local/latest.csv"
default_output_schema_version = "ltsf_linear_local.long_metrics.v1"
dataset_scope = ["kelmarsh", "penmanshiel", "hill_of_towie", "sdwpf_kddcup"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["val", "test"]
supported_feature_protocols = [
  "power_only",
  "staged_past_covariates.stage1_core",
  "staged_past_covariates.stage2_ops",
  "staged_past_covariates.stage3_regime",
]
implementation_label_kind = "covariate_stage"
implementation_labels = ["reference", "stage1_core", "stage2_ops", "stage3_regime"]
model_variants = ["nlinear", "dlinear"]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "turbine"

[implementation_bindings]
reference = "power_only"
stage1_core = "staged_past_covariates.stage1_core"
stage2_ops = "staged_past_covariates.stage2_ops"
stage3_regime = "staged_past_covariates.stage3_regime"
