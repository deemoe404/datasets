schema_version = 1
family_id = "agcrn_official_aligned"
display_name = "AGCRN Official-Aligned"
status = "pilot"
summary = "Official-aligned AGCRN baseline on the Kelmarsh farm-synchronous power-only, wind-speed-history, wind-direction-sincos, and yaw-aware wind-direction tasks."
model_family = "agcrn"
training_mode = "trainable"
implementation_root = "experiment/families/agcrn"
readme_path = "experiment/families/agcrn/README.md"
runner_entrypoint = "experiment/families/agcrn/run_agcrn.py"
default_output_path = "experiment/artifacts/published/agcrn_official_aligned/latest.csv"
default_output_schema_version = "agcrn_official_aligned.long_metrics.v1"
dataset_scope = ["kelmarsh"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["val", "test"]
supported_feature_protocols = ["power_only", "power_ws_hist", "power_wd_hist_sincos", "power_wd_yaw_hist_sincos", "power_ws_wd_hist_sincos"]
implementation_label_kind = "model_variant"
implementation_labels = [
  "official_aligned_power_only_farm_sync",
  "official_aligned_power_ws_hist_farm_sync",
  "official_aligned_power_wd_hist_sincos_farm_sync",
  "official_aligned_power_wd_yaw_hist_sincos_farm_sync",
  "official_aligned_power_ws_wd_hist_sincos_farm_sync",
]
model_variants = [
  "official_aligned_power_only_farm_sync",
  "official_aligned_power_ws_hist_farm_sync",
  "official_aligned_power_wd_hist_sincos_farm_sync",
  "official_aligned_power_wd_yaw_hist_sincos_farm_sync",
  "official_aligned_power_ws_wd_hist_sincos_farm_sync",
]
notes = [
  "This family is currently narrower than the other trainable baselines: Kelmarsh only and farm-synchronous only.",
]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "farm"

[implementation_bindings]
official_aligned_power_only_farm_sync = "power_only"
official_aligned_power_ws_hist_farm_sync = "power_ws_hist"
official_aligned_power_wd_hist_sincos_farm_sync = "power_wd_hist_sincos"
official_aligned_power_wd_yaw_hist_sincos_farm_sync = "power_wd_yaw_hist_sincos"
official_aligned_power_ws_wd_hist_sincos_farm_sync = "power_ws_wd_hist_sincos"
