schema_version = 1
family_id = "tft_turbine_pilot"
display_name = "TFT Turbine Pilot"
status = "archived"
summary = "Kelmarsh TFT pilot with static, calendar, and staged historical covariate input packs."
model_family = "tft"
training_mode = "trainable"
implementation_root = "experiment/families/tft"
readme_path = "experiment/families/tft/README.md"
runner_entrypoint = "experiment/families/tft/run_tft.py"
default_output_path = "experiment/artifacts/published/tft_turbine_pilot/latest.csv"
default_output_schema_version = "tft_turbine_pilot.long_metrics.v1"
dataset_scope = ["kelmarsh"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["val", "test"]
supported_feature_protocols = [
  "power_only",
  "static_calendar",
  "staged_past_covariates.stage1_core",
  "staged_past_covariates.stage2_ops",
  "static_calendar_stage1",
  "static_calendar_stage2",
]
implementation_label_kind = "input_pack"
implementation_labels = [
  "reference",
  "known_static",
  "hist_stage1",
  "hist_stage2",
  "mixed_stage1",
  "mixed_stage2",
]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "turbine"

[implementation_bindings]
reference = "power_only"
known_static = "static_calendar"
hist_stage1 = "staged_past_covariates.stage1_core"
hist_stage2 = "staged_past_covariates.stage2_ops"
mixed_stage1 = "static_calendar_stage1"
mixed_stage2 = "static_calendar_stage2"
