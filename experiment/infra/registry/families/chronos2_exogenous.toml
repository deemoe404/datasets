schema_version = 1
family_id = "chronos2_exogenous"
display_name = "Chronos-2 Exogenous"
status = "archived"
summary = "Zero-shot Chronos-2 runs with dataset-native past covariates on the turbine task."
model_family = "chronos-2"
training_mode = "zero_shot"
implementation_root = "experiment/families/chronos-2-exogenous"
readme_path = "experiment/families/chronos-2-exogenous/README.md"
runner_entrypoint = "experiment/families/chronos-2-exogenous/run_exogenous.py"
orchestrator_entrypoint = "experiment/families/chronos-2-exogenous/run_exogenous_full.py"
default_output_path = "experiment/artifacts/published/chronos2_exogenous/latest.csv"
default_output_schema_version = "chronos2_exogenous.long_metrics.v1"
dataset_scope = ["kelmarsh", "penmanshiel", "hill_of_towie", "sdwpf_kddcup"]
supported_eval_protocols = ["rolling_origin_no_refit", "non_overlap"]
supported_result_splits = ["test"]
supported_feature_protocols = [
  "power_only",
  "staged_past_covariates.stage1_core",
  "staged_past_covariates.stage2_ops",
  "staged_past_covariates.stage3_regime",
]
implementation_label_kind = "covariate_stage"
implementation_labels = ["reference", "stage1_core", "stage2_ops", "stage3_regime"]
model_variants = ["univariate"]

[task_contract]
task_id = "next_6h_from_24h"
history_duration = "24h"
forecast_duration = "6h"
window_protocol = "dense_sliding"
split_protocol = "raw_chrono_70_10_20_strict_closed"
granularity = "turbine"

[implementation_bindings]
reference = "power_only"
stage1_core = "staged_past_covariates.stage1_core"
stage2_ops = "staged_past_covariates.stage2_ops"
stage3_regime = "staged_past_covariates.stage3_regime"
